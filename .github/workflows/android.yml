name: Build Android APK from ZIP

on:
  push:
      branches: [ main ]
        workflow_dispatch:

        jobs:
          build:
              runs-on: ubuntu-latest

                  steps:
                        - uses: actions/checkout@v4

                              - name: Unzip project
                                      run: |
                                                unzip -o project_to_upload.zip -d .
                                                          # Find where pubspec.yaml is
                                                                    PROJECT_DIR=$(find . -name pubspec.yaml -exec dirname {} \; | head -n 1)
                                                                              if [ -z "$PROJECT_DIR" ]; then
                                                                                          echo "Error: pubspec.yaml not found!"
                                                                                                      exit 1
                                                                                                                fi
                                                                                                                          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
                                                                                                                                    echo "Found project in: $PROJECT_DIR"
                                                                                                                                    
                                                                                                                                          - name: Set up Java
                                                                                                                                                  uses: actions/setup-java@v4
                                                                                                                                                          with:
                                                                                                                                                                    distribution: 'temurin'
                                                                                                                                                                              java-version: '17'
                                                                                                                                                                              
                                                                                                                                                                                    - name: Set up Flutter
                                                                                                                                                                                            uses: subosito/flutter-action@v2
                                                                                                                                                                                                    with:
                                                                                                                                                                                                              flutter-version: '3.24.0'
                                                                                                                                                                                                                        channel: 'stable'
                                                                                                                                                                                                                        
                                                                                                                                                                                                                              - name: Set up Rust
                                                                                                                                                                                                                                      uses: dtolnay/rust-toolchain@stable
                                                                                                                                                                                                                                              with:
                                                                                                                                                                                                                                                        targets: aarch64-linux-android, armv7-linux-androideabi, x86_64-linux-android, i686-linux-android
                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                              - name: Install flutter_rust_bridge_codegen
                                                                                                                                                                                                                                                                      run: cargo install flutter_rust_bridge_codegen --version 2.3.0
                                                                                                                                                                                                                                                                      
                                                                                                                                                                                                                                                                            - name: Install dependencies
                                                                                                                                                                                                                                                                                    run: |
                                                                                                                                                                                                                                                                                              cd ${{ env.PROJECT_DIR }}
                                                                                                                                                                                                                                                                                                        flutter pub get
                                                                                                                                                                                                                                                                                                        
                                                                                                                                                                                                                                                                                                              - name: Generate Rust Bridge Code
                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                cd ${{ env.PROJECT_DIR }}
                                                                                                                                                                                                                                                                                                                                          flutter_rust_bridge_codegen generate
                                                                                                                                                                                                                                                                                                                                          
                                                                                                                                                                                                                                                                                                                                                - name: Build APK
                                                                                                                                                                                                                                                                                                                                                 
